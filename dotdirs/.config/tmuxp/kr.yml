session_name: kr
start_directory: ~/scm/krautreporter.krautreporter
windows:
  - window_name: Dev
    layout: 8cf9,490x101,0,0{245x101,0,0[245x80,0,0,72,245x20,0,81,76],244x101,246,0[244x80,246,0,73,244x20,246,81,77]}
    panes:
      - shell_command:
        - claude
      - shell_command:
        - ssh-add -D # remove all ssh identities
        - ssh-add --apple-use-keychain ~/.ssh/id_ed25519 # load only the one for KR
        - pg_ctl start -l log/postgres.log
        - git up
        - bundle install
        - corepack enable yarn
        - yarn install
        - overmind s --procfile Procfile.dev
      - shell_command:
        - nvim README.md
      - shell_command:
        - echo "hello"
